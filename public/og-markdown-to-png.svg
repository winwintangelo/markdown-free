<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Header: logo + wordmark -->
  <rect x="72" y="52" width="56" height="56" rx="12" fill="#10B981"/>
  <text x="100" y="89" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">md</text>
  <text x="146" y="90" font-size="30" font-weight="600" fill="#0f172a">Markdown Free</text>

  <!-- ===== Left card: raw Markdown ===== -->
  <g filter="url(#shadow)">
    <rect x="96" y="176" width="430" height="268" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <circle cx="124" cy="208" r="6" fill="#fca5a5"/>
  <circle cx="144" cy="208" r="6" fill="#fcd34d"/>
  <circle cx="164" cy="208" r="6" fill="#86efac"/>
  <text x="500" y="213" text-anchor="end" font-size="16" font-weight="600" fill="#94a3b8" letter-spacing="1">.MD</text>
  <g font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="22" xml:space="preserve">
    <text x="128" y="266"><tspan fill="#10B981" font-weight="700">#&#160;</tspan><tspan fill="#0f172a" font-weight="700">Weekly Update</tspan></text>
    <text x="128" y="306"><tspan fill="#10B981">-&#160;</tspan><tspan fill="#334155">Shipped&#160;</tspan><tspan fill="#0f172a" font-weight="700">v2.0</tspan></text>
    <text x="128" y="346"><tspan fill="#10B981">-&#160;</tspan><tspan fill="#334155">No signup needed</tspan></text>
    <text x="128" y="386"><tspan fill="#10B981">-&#160;</tspan><tspan fill="#334155">Runs in browser</tspan></text>
    <rect x="128" y="404" width="248" height="30" rx="6" fill="#f1f5f9"/>
    <text x="140" y="426" fill="#0f766e">`npm run build`</text>
  </g>

  <!-- ===== Arrow ===== -->
  <circle cx="600" cy="310" r="34" fill="#10B981"/>
  <text x="600" y="326" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">&#8594;</text>

  <!-- ===== Right card: rendered image ===== -->
  <g filter="url(#shadow)">
    <rect x="674" y="150" width="430" height="320" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <!-- PNG badge -->
  <rect x="1012" y="172" width="72" height="34" rx="17" fill="#10B981"/>
  <text x="1048" y="195" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">PNG</text>
  <!-- rendered heading -->
  <text x="706" y="212" font-size="30" font-weight="700" fill="#0f172a">Weekly Update</text>
  <rect x="706" y="226" width="120" height="4" rx="2" fill="#10B981"/>
  <!-- rendered bullets -->
  <g font-size="21" fill="#334155">
    <circle cx="714" cy="266" r="4" fill="#10B981"/>
    <text x="730" y="273">Shipped <tspan font-weight="700" fill="#0f172a">v2.0</tspan></text>
    <circle cx="714" cy="304" r="4" fill="#10B981"/>
    <text x="730" y="311">No signup needed</text>
    <circle cx="714" cy="342" r="4" fill="#10B981"/>
    <text x="730" y="349">Runs in browser</text>
  </g>
  <rect x="706" y="372" width="360" height="40" rx="8" fill="#f1f5f9"/>
  <text x="726" y="399" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="19" fill="#0f766e">npm run build</text>
  <!-- long-image hint: fade strip at bottom -->
  <rect x="706" y="430" width="360" height="14" rx="7" fill="#e2e8f0" opacity="0.7"/>

  <!-- ===== Headline ===== -->
  <text x="600" y="530" text-anchor="middle" font-size="52" font-weight="800" fill="#0f172a">Markdown <tspan fill="#10B981">&#8594;</tspan> Image</text>
  <text x="600" y="574" text-anchor="middle" font-size="25" fill="#475569">Free &#183; No signup &#183; Nothing leaves your browser</text>
  <text x="600" y="612" text-anchor="middle" font-size="22" font-weight="600" fill="#10B981">markdown.free</text>
</svg>
